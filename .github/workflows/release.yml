name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.13.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm test:coverage
      - run: pnpm test:types
      - run: pnpm audit --prod
      - run: pnpm licenses:check
      - run: pnpm benchmark:check
      - run: pnpm pack:consumer -- --output=.release/ua-compass.tgz
      - run: pnpm publish .release/ua-compass.tgz --access public --provenance --no-git-checks
